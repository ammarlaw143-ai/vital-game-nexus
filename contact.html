<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contact — Nexus Gaming</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body>
<div id="header"></div>
<section class="page-header">
  <div class="grid-bg"></div><div class="fade"></div>
  <div class="container inner">
    <p class="eyebrow">Get In Touch</p>
    <h1>Contact Us</h1>
    <div class="bar bg-neon"></div>
    <p>Pitches, tips, partnership requests, or just to say hi — we read everything.</p>
  </div>
</section>
<section class="container" style="padding:3rem 1rem;max-width:42rem">
  <form class="glass" style="padding:2rem;border-radius:.75rem" onsubmit="event.preventDefault();document.getElementById('thanks').style.display='block';this.reset()">
    <div style="margin-bottom:1rem"><label class="label">Name</label><input class="input" required/></div>
    <div style="margin-bottom:1rem"><label class="label">Email</label><input class="input" type="email" required/></div>
    <div style="margin-bottom:1rem"><label class="label">Subject</label><input class="input" required/></div>
    <div style="margin-bottom:1.25rem"><label class="label">Message</label><textarea class="textarea" required></textarea></div>
    <button class="btn btn-primary" type="submit">Send message</button>
    <p id="thanks" style="display:none;margin-top:1rem;color:var(--neon);font-size:.875rem">Thanks — we'll get back to you soon.</p>
  </form>
</section>
<div id="footer"></div>
<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script>Nexus.mountLayout("contact.html");</script>
</body>
</html>
